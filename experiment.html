<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌视觉感知实验</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f8f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
#app { max-width: 700px; width: 100%; margin: 0 auto; padding: 40px 20px; text-align: center; }
h2 { margin-bottom: 20px; }
h3 { margin-bottom: 16px; }
p { line-height: 1.8; margin-bottom: 12px; text-align: left; }
ul { text-align: left; line-height: 2; margin-bottom: 16px; padding-left: 20px; }
.btn { background: #4a90d9; color: #fff; border: none; padding: 12px 32px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 16px; }
.btn:hover { background: #357abd; }
.fixation { font-size: 64px; color: #333; }
.key-hint { display: inline-block; font-weight: bold; padding: 2px 10px; border-radius: 4px; margin: 0 4px; }
.key-f { background: #e8f5e9; color: #2e7d32; }
.key-j { background: #fce4ec; color: #c62828; }
img.stimulus { max-width: 80%; max-height: 60vh; min-height: 200px; min-width: 200px; object-fit: contain; background: #eee; }
.warn { color: #999; font-size: 0.85em; }
.code { font-size: 1.5em; background: #f0f0f0; padding: 4px 12px; font-weight: bold; font-family: monospace; }
.touch-btn-row { display: flex; justify-content: center; gap: 24px; margin-top: 16px; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
.touch-btn { flex: 1; max-width: 220px; padding: 28px 20px; font-size: 22px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.touch-btn-f { background: #e8f5e9; color: #2e7d32; border: 3px solid #4caf50; }
.touch-btn-j { background: #fce4ec; color: #c62828; border: 3px solid #e57373; }
.touch-btn:active { transform: scale(0.95); transition: transform 0.05s; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// CONFIG
// ============================================================
const IMAGES_BWC = ['images/Hermes_BWC.png','images/Chanel_BWC.png','images/Dior_BWC.png','images/Lv_BWC.png','images/Gucci_BWC.png','images/Prada_BWC.png'];
const IMAGES_CC  = ['images/Hermes_CC.png','images/Chanel_CC.png','images/Dior_CC.png','images/Lv_CC.png','images/Gucci_CC.png','images/Prada_CC.png'];
const BRAND_NAMES = ['Hermes','Chanel','Dior','Louis Vuitton','Gucci','Prada'];

const condition = Math.random() < 0.5 ? 'BWC' : 'CC';
const images = condition === 'BWC' ? IMAGES_BWC : IMAGES_CC;
const conditionCode = condition === 'BWC' ? 1 : 0;
const subjectId = 'RT' + Date.now().toString(36).toUpperCase();
const deviceType = isMobile() ? 'mobile' : 'desktop';

// Build trial list (random order)
const trialList = images.map((img, i) => ({ image: img, brand: BRAND_NAMES[i] }));
for (let i = trialList.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [trialList[i], trialList[j]] = [trialList[j], trialList[i]];
}

// Data storage
const trialData = [];
let currentTrial = 0;
let trialStartTime = 0;
let responded = false;
let trialActive = false;
let trialTimeoutId = null;
let countdownIntervalId = null;

// ============================================================
// HELPERS
// ============================================================
function isMobile() {
  return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function downloadCSV() {
  const rows = trialData.map(d => [
    d.subject_id, d.condition, d.trial, d.image, d.brand,
    d.rt_ms, d.correct, d.timeout, d.trial_start, d.device_type
  ].join(','));
  const header = 'subject_id,condition,trial,image,brand,rt_ms,correct,timeout,trial_start,device_type';
  const csv = '﻿' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = subjectId + '_data.csv';
  a.click();
}

// ============================================================
// SCREENS
// ============================================================
const app = document.getElementById('app');

function showWelcome() {
  app.innerHTML = `
    <h2>品牌视觉感知实验</h2>
    <p>欢迎您参与本次学术研究。</p>
    <p><b>任务说明：</b>您将依次看到一系列品牌图像。请<u>尽快且准确</u>地判断：</p>
    <p style="text-align:center;font-size:1.2em;"><b>该图像是否来自奢侈品牌？</b></p>
    <p style="text-align:center;">按 <span class="key-hint key-f">F</span> = 是奢侈品牌</p>
    <p style="text-align:center;">按 <span class="key-hint key-j">J</span> = 不是奢侈品牌</p>
    <p>实验共有6个试次，请保持注意力集中。</p>
    <button class="btn" onclick="showInstructions()">开始实验</button>
  `;
}

function showInstructions() {
  if (isMobile()) {
    app.innerHTML = `
      <h3>操作提示</h3>
      <ul>
        <li>图像出现后请<b>尽快</b>做出判断</li>
        <li>点击下方对应按钮即可</li>
      </ul>
      <div class="touch-btn-row">
        <button class="touch-btn touch-btn-f" disabled>奢侈品牌</button>
        <button class="touch-btn touch-btn-j" disabled>非奢侈品牌</button>
      </div>
      <p style="margin-top:16px;color:#666;">正式实验时按钮可以点击</p>
      <button class="btn" onclick="showReady()">准备好了</button>
    `;
    return;
  }
  app.innerHTML = `
    <h3>操作提示</h3>
    <ul>
      <li>图像出现后请<b>尽快</b>做出判断</li>
      <li>将左手食指放在 <span class="key-hint key-f">F 键</span>，右手食指放在 <span class="key-hint key-j">J 键</span></li>
    </ul>
    <button class="btn" onclick="showReady()">准备好了</button>
  `;
}

function showReady() {
  const hint = isMobile() ?
    '点击 <span style="color:#2e7d32;font-weight:bold;">奢侈品牌</span> 或 <span style="color:#c62828;font-weight:bold;">非奢侈品牌</span> 按钮' :
    '<span class="key-hint key-f">F = 奢侈品牌</span>，<span class="key-hint key-j">J = 非奢侈品牌</span>';
  app.innerHTML = `
    <h3>准备开始</h3>
    <p>接下来进入正式实验，记住：${hint}</p>
    <button class="btn" onclick="preloadAndStart()">开始正式实验</button>
  `;
}

// Preload all images before starting trials
async function preloadAndStart() {
  app.innerHTML = '<h3>加载中...</h3><p>正在预加载实验图像，请稍候。</p><p id="load-progress"></p>';
  const progress = document.getElementById('load-progress');
  let loaded = 0;
  const total = trialList.length;

  const loadPromises = trialList.map((t, i) => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        loaded++;
        progress.textContent = '已加载 ' + loaded + ' / ' + total;
        resolve();
      };
      img.onerror = () => {
        progress.textContent += ' [图片 ' + (i+1) + ' 加载失败: ' + t.image + ']';
        resolve(); // continue even if one fails
      };
      img.src = t.image;
    });
  });

  await Promise.all(loadPromises);
  await sleep(300); // brief pause so user sees completion
  startTrial(0);
}

// ============================================================
// TRIAL LOGIC
// ============================================================

// Phase 1: fixation
async function startTrial(idx) {
  if (idx >= trialList.length) {
    showCompletion();
    return;
  }
  currentTrial = idx;
  responded = false;

  app.innerHTML = '<div class="fixation">+</div>';
  await sleep(500);

  // Phase 2: image judgment
  showStimulus(idx);
}

function showStimulus(idx) {
  const t = trialList[idx];
  // Mobile: show touch buttons; Desktop: show keyboard hints
  const responseUI = isMobile() ? `
    <div class="touch-btn-row">
      <button class="touch-btn touch-btn-f" id="btn-f">奢侈品牌</button>
      <button class="touch-btn touch-btn-j" id="btn-j">非奢侈品牌</button>
    </div>
  ` : `
    <p style="text-align:center;margin-top:12px;font-size:1.1em;">按 <span class="key-hint key-f">F</span> = 奢侈品牌 &nbsp; 按 <span class="key-hint key-j">J</span> = 非奢侈品牌</p>
  `;

  app.innerHTML = `
    <img src="${t.image}" class="stimulus" id="stimulus-img" onerror="this.outerHTML='<p style=color:red>图片加载失败</p>'">
    ${responseUI}
    <p style="text-align:center;color:#999;font-size:0.85em;">图像 ${idx + 1} / 6 &nbsp; | &nbsp; 剩余时间：<span id="countdown">5.0</span> 秒</p>
  `;

  // Bind touch events for mobile
  if (isMobile()) {
    const btnF = document.getElementById('btn-f');
    const btnJ = document.getElementById('btn-j');
    btnF.addEventListener('touchstart', function(e) { e.preventDefault(); handleResponse('f'); });
    btnJ.addEventListener('touchstart', function(e) { e.preventDefault(); handleResponse('j'); });
  }

  // Clear any stale timeout/interval from previous trial
  if (trialTimeoutId) clearTimeout(trialTimeoutId);
  if (countdownIntervalId) clearInterval(countdownIntervalId);

  // Since images are preloaded, they render from cache immediately.
  trialActive = true;
  trialStartTime = performance.now();

  const cdEl = document.getElementById('countdown');
  countdownIntervalId = setInterval(() => {
    if (responded) { clearInterval(countdownIntervalId); return; }
    const remaining = (5000 - (performance.now() - trialStartTime)) / 1000;
    if (remaining <= 0) { clearInterval(countdownIntervalId); return; }
    cdEl.textContent = remaining.toFixed(1);
  }, 100);

  // Timeout after 5000ms
  trialTimeoutId = setTimeout(() => {
    clearInterval(countdownIntervalId);
    if (!responded) {
      responded = true;
      trialActive = false;
      recordTrial(null, true);
      itiThenNext(idx);
    }
  }, 5000);
}

function handleResponse(key) {
  if (!trialActive || responded) return;
  responded = true;
  trialActive = false;
  if (trialTimeoutId) clearTimeout(trialTimeoutId);
  if (countdownIntervalId) clearInterval(countdownIntervalId);
  recordTrial(key, false);
  itiThenNext(currentTrial);
}

function onKeyDown(e) {
  if (!trialActive || responded) return;
  var key = (e.key || '').toLowerCase();
  if (key !== 'f' && key !== 'j') return;
  e.preventDefault();
  handleResponse(key);
}

function recordTrial(response, timeout) {
  const rt = timeout ? 5000 : Math.round(performance.now() - trialStartTime);
  const t = trialList[currentTrial];
  trialData.push({
    subject_id: subjectId,
    condition: conditionCode,
    trial: currentTrial + 1,
    image: t.image,
    brand: t.brand,
    rt_ms: rt,
    correct: response === 'f' ? 1 : 0,
    timeout: timeout ? 1 : 0,
    trial_start: new Date().toISOString(),
    device_type: deviceType
  });
}

async function itiThenNext(idx) {
  trialActive = false;
  const iti = Math.floor(Math.random() * 401) + 400; // 400-800ms
  app.innerHTML = '';
  await sleep(iti);
  startTrial(idx + 1);
}

// ============================================================
// COMPLETION
// ============================================================
function showCompletion() {
  app.innerHTML = `
    <h3>实验完成！</h3>
    <p>感谢您的参与。</p>
    <p>您的完成码：<span class="code">${subjectId}</span></p>
    <p class="warn">请将此码填入问卷星中的"实验完成码"一栏。</p>
    <p style="margin-top:20px;">点击下方按钮下载实验数据：</p>
    <button class="btn" onclick="downloadCSV()">下载数据文件</button>
    <p class="warn" style="margin-top:12px;">请将下载的 CSV 文件发送给研究者。</p>
  `;
}

// ============================================================
// START
// ============================================================
// Global keydown listener — attached once, never removed.
// trialActive flag guards when keystrokes are accepted.
document.addEventListener('keydown', onKeyDown);

showWelcome();
</script>
</body>
</html>
